<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login with Lightning</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .card {
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 40px 32px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .bolt {
      font-size: 2.5rem;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 0.875rem;
      color: #888;
      margin-bottom: 28px;
    }

    /* loading spinner */
    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid #2a2a2a;
      border-top-color: #f7931a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 24px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* QR section */
    #qr-section { display: none; }

    .qr-wrap {
      display: inline-block;
      background: #fff;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .qr-wrap img {
      display: block;
      width: 220px;
      height: 220px;
    }

    .lnurl-row {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
    }

    .lnurl-text {
      flex: 1;
      font-size: 0.75rem;
      font-family: monospace;
      color: #aaa;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .copy-btn {
      flex-shrink: 0;
      background: #2a2a2a;
      border: none;
      color: #e0e0e0;
      font-size: 0.75rem;
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .copy-btn:hover { background: #363636; }
    .copy-btn.copied { color: #4caf50; }

    .hint {
      font-size: 0.75rem;
      color: #555;
    }

    /* waiting indicator */
    #waiting {
      display: none;
      margin-top: 20px;
      font-size: 0.875rem;
      color: #888;
    }

    .dot-pulse::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }
    @keyframes dots {
      0%   { content: ''; }
      25%  { content: '.'; }
      50%  { content: '..'; }
      75%  { content: '...'; }
    }

    /* success */
    #success-section {
      display: none;
      padding: 24px 0 8px;
    }
    .success-icon { font-size: 2.5rem; margin-bottom: 12px; }
    .success-text { font-size: 1rem; color: #4caf50; }

    /* error */
    #error-section {
      display: none;
      padding: 12px 0;
    }
    .error-text {
      font-size: 0.875rem;
      color: #f44336;
      margin-bottom: 16px;
    }
    .retry-btn {
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      color: #e0e0e0;
      padding: 8px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.875rem;
      transition: background 0.15s;
    }
    .retry-btn:hover { background: #2a2a2a; }
  </style>
</head>
<body>
  <div class="card">
    <div class="bolt">&#9889;</div>
    <h1>Login with Lightning</h1>
    <p class="subtitle">Scan the QR code with your Lightning wallet</p>

    <div id="loading-section">
      <div class="spinner"></div>
    </div>

    <div id="qr-section">
      <div class="qr-wrap">
        <img id="qr-img" src="" alt="LNURL QR code">
      </div>
      <div class="lnurl-row">
        <span class="lnurl-text" id="lnurl-display"></span>
        <button class="copy-btn" id="copy-btn" onclick="copyLnurl()">Copy</button>
      </div>
      <p class="hint">Open your wallet app and scan, or paste the LNURL above.</p>
    </div>

    <div id="waiting">
      <span class="dot-pulse">Waiting for wallet</span>
    </div>

    <div id="success-section">
      <div class="success-icon">&#10003;</div>
      <div class="success-text">Authenticated — redirecting&hellip;</div>
    </div>

    <div id="error-section">
      <p class="error-text" id="error-msg"></p>
      <button class="retry-btn" onclick="retry()">Try again</button>
    </div>
  </div>

  <script>
    const LOGIN_CHALLENGE = {{ login_challenge | tojson }};

    let lnurlText = "";
    let eventSource = null;

    function show(id) {
      ["loading-section", "qr-section", "waiting", "success-section", "error-section"]
        .forEach(s => document.getElementById(s).style.display = s === id ? "block" : "none");
    }

    async function init() {
      show("loading-section");

      let k1, lnurl;
      try {
        const resp = await fetch(
          `/lnurl/generate?login_challenge=${encodeURIComponent(LOGIN_CHALLENGE)}`
        );
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        ({ k1, lnurl } = await resp.json());
      } catch (err) {
        showError("Failed to generate login challenge. Please refresh.");
        return;
      }

      lnurlText = lnurl;

      // Open SSE before showing QR so we don't miss the callback
      eventSource = new EventSource(`/lnurl/stream/${encodeURIComponent(k1)}`);

      eventSource.addEventListener("connected", () => {
        document.getElementById("qr-img").src = `/lnurl/qr/${encodeURIComponent(k1)}`;
        document.getElementById("lnurl-display").textContent = lnurl.toUpperCase();
        show("qr-section");
        document.getElementById("waiting").style.display = "block";
      });

      eventSource.addEventListener("authenticated", (e) => {
        const { redirect_to } = JSON.parse(e.data);
        eventSource.close();
        show("success-section");
        window.location.href = redirect_to;
      });

      eventSource.addEventListener("expired", () => {
        eventSource.close();
        showError("Challenge expired. Please try again.");
      });

      eventSource.onerror = () => {
        eventSource.close();
        showError("Connection lost. Please refresh the page.");
      };
    }

    function showError(msg) {
      if (eventSource) { eventSource.close(); eventSource = null; }
      document.getElementById("error-msg").textContent = msg;
      show("error-section");
    }

    function retry() {
      init();
    }

    function copyLnurl() {
      navigator.clipboard.writeText(lnurlText.toUpperCase()).then(() => {
        const btn = document.getElementById("copy-btn");
        btn.textContent = "Copied!";
        btn.classList.add("copied");
        setTimeout(() => {
          btn.textContent = "Copy";
          btn.classList.remove("copied");
        }, 2000);
      });
    }

    init();
  </script>
</body>
</html>
