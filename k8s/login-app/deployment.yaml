apiVersion: apps/v1
kind: Deployment
metadata:
  name: lnurl-login
  namespace: auth
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lnurl-login
  template:
    metadata:
      labels:
        app: lnurl-login
    spec:
      containers:
        - name: app
          image: your-registry/lnurl-hydra-login:latest
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: redis-url
            - name: LNURL_CALLBACK_URL
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: lnurl-callback-url
          envFrom:
            - configMapRef:
                name: login-app-config
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
