# Template - replace all CHANGEME values before applying.
# Consider using Sealed Secrets or External Secrets Operator in production
# rather than committing real values here.
apiVersion: v1
kind: Secret
metadata:
  name: auth-secrets
  namespace: auth
type: Opaque
stringData:
  # --- Login app ---
  # Connection to your existing PostgreSQL instance
  database-url: "postgresql://lnurl:CHANGEME@postgres.default.svc.cluster.local:5432/lnurl_hydra_login"
  # Connection to your existing Redis instance
  redis-url: "redis://redis.default.svc.cluster.local:6379"
  # Public HTTPS URL Lightning wallets POST to - must be reachable from the internet
  lnurl-callback-url: "https://auth.example.com/lnurl/callback"

  # --- Hydra ---
  # Connection to your existing PostgreSQL instance (separate DB from login app)
  hydra-dsn: "postgres://hydra:CHANGEME@postgres.default.svc.cluster.local:5432/hydra"
  # At least 32 random characters: openssl rand -hex 32
  hydra-system-secret: "CHANGEME-replace-with-openssl-rand-hex-32"
  # Used to sign cookies: openssl rand -hex 16
  hydra-cookie-secret: "CHANGEME-replace-with-openssl-rand-hex-16"

  # --- Cloudflare Tunnel ---
  # Paste the contents of ~/.cloudflared/<tunnel-id>.json from the dev VM
  tunnel-credentials.json: |
    {
      "AccountTag": "CHANGEME",
      "TunnelSecret": "CHANGEME",
      "TunnelID": "CHANGEME"
    }
