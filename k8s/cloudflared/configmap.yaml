# Replace CHANGEME-tunnel-id with the TunnelID from your credentials JSON.
# Replace example.com with your actual domain throughout.
apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: auth
data:
  config.yaml: |
    tunnel: CHANGEME-tunnel-id
    credentials-file: /etc/cloudflared/tunnel-credentials.json

    ingress:
      # Hydra OIDC endpoints - Cloudflare Access uses this as the provider URL
      - hostname: hydra.example.com
        service: http://hydra.auth.svc.cluster.local:4444

      # Login app - login page, consent page, LNURL wallet callback
      - hostname: auth.example.com
        service: http://lnurl-login.auth.svc.cluster.local:3000

      # Required catch-all
      - service: http_status:404
